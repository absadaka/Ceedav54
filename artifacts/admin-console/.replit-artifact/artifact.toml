kind = "web"
previewPath = "/admin-console/"
title = "CEEDA — Platform Admin"
version = "1.0.0"
id = "artifacts/admin-console"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 26208
name = "web"
paths = ["/admin-console/"]

[services.development]
run = "pnpm --filter @workspace/admin-console run dev"

[services.env]
PORT = "26208"
BASE_PATH = "/admin-console/"

[services.production]
build = ["pnpm", "--filter", "@workspace/admin-console", "run", "build"]
publicDir = "artifacts/admin-console/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
